name: Destroy idle game server

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  destroy-if-idle:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Call idle destroy endpoint
        run: |
          echo "🕒 Checking idle game server at $(date -u) UTC"
          
          curl -fsSL -w "HTTP Status: %{http_code}\n" \
               -H "User-Agent: GitHub-Actions" \
               "https://komm-folge-mir-nach.de/api/fetch-game-server.php?action=destroy-if-idle&key=${{ secrets.GAME_SERVER_KEY }}"
